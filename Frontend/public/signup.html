<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card" aria-labelledby="signup-title">
            <div class="brand">VIOLET</div>
            <h1 id="signup-title">Create account</h1>
            <p class="subtitle">Add your details to create a PostgreSQL-backed account.</p>

            <form id="signupForm" class="auth-form">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" autocomplete="username" minlength="3" required>

                <label for="email">Email address</label>
                <input id="email" name="email" type="email" autocomplete="email" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" autocomplete="new-password" minlength="6" required>

                <p id="message" class="form-message" role="status" aria-live="polite"></p>

                <button type="submit">Sign up</button>
            </form>

            <p class="footer-text">
                Already have an account?
                <a href="/login">Login</a>
            </p>
        </section>
    </main>

    <script>
        const form = document.getElementById("signupForm");
        const message = document.getElementById("message");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            message.textContent = "Creating account...";
            message.className = "form-message";

            const payload = {
                username: form.username.value.trim(),
                email: form.email.value.trim(),
                password: form.password.value
            };

            try {
                const response = await fetch("/api/auth/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || "Signup failed");
                }

                message.textContent = "Account created. Redirecting to login...";
                message.classList.add("success");
                setTimeout(() => {
                    window.location.href = "/login";
                }, 800);
            } catch (error) {
                message.textContent = error.message;
                message.classList.add("error");
            }
        });
    </script>
</body>
</html>
